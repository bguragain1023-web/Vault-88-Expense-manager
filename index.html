<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />

    <title>Vault-88 prank ledger</title>
  </head>
  <body>
    <div class="wrapper flex-center">
      <div class="container">
        <div class="title">
          <h1>VAULT-88</h1>
          <h4>Expense Manager</h4>
        </div>

        <div class="total-amount">
          <div class="total">Total:$ <span>0</span></div>
        </div>

        <div class="input-detail">
          <input class="itemname" type="text" placeholder="Item Name" />
          <input class="amount" type="number" placeholder="$Amount " />
          <button class="add-btn">Add Expenses</button>
        </div>

        <div>
          <ul class="expense-list"></ul>

          <button class="btnclear">CLEAR ALL DATA</button>
        </div>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
